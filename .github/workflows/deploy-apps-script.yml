name: Deploy Apps Script

# apps_script/ 폴더 변경 시에만 트리거 — 다른 파일 (CLAUDE.md 등) 수정엔 불필요한 deploy 안 함
on:
  push:
    branches: [main]
    paths:
      - 'apps_script/**'
      - '.github/workflows/deploy-apps-script.yml'
  workflow_dispatch:   # 수동 실행 버튼 (GitHub Actions 탭에서)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Restore clasp credentials (~/.clasprc.json)
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          echo "$CLASPRC_JSON" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Restore project config (apps_script/.clasp.json)
        env:
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          echo "$CLASP_JSON" > apps_script/.clasp.json
          chmod 600 apps_script/.clasp.json

      - name: Push to Apps Script (폰스팟 본점)
        working-directory: apps_script
        run: clasp push --force

      # 멀티 브랜드 신설 시 (KT/국민/진짜폰스팟) 아래 패턴으로 1개씩 추가
      # - name: Push to Apps Script (KT)
      #   working-directory: brands/kt
      #   env:
      #     CLASP_JSON: ${{ secrets.CLASP_JSON_KT }}
      #   run: |
      #     echo "$CLASP_JSON" > .clasp.json
      #     clasp push --force

      # 실패 시 텔레그램 알림 (2026-06-15 추가). 카드뉴스용 봇 재활용.
      # GitHub Secrets 필요: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🚨 Apps Script 배포 실패%0A리포: ${{ github.repository }}%0A브랜치: ${{ github.ref_name }}%0A커밋: ${{ github.sha }}%0A실행자: ${{ github.actor }}%0A👉 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}"

      # 성공 알림은 굳이 안 넣음 (매번 알림 = 노이즈). 실패만 알림.
